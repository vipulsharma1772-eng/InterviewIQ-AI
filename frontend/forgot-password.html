<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - InterviewIQ AI</title>
  </head>
  <body class="bg-[#F8F9FA] text-black font-sans antialiased min-h-screen flex flex-col items-center justify-center p-4 overflow-y-auto">
    <div class="bg-white w-full max-w-[400px] rounded-[24px] p-6 shadow-[0_20px_60px_rgba(0,0,0,0.06)] border border-black/5 my-auto relative">

      <!-- Back Button -->
      <a href="/login.html" class="absolute top-5 left-5 flex items-center gap-1.5 text-[12px] font-semibold text-gray-500 hover:text-black transition-colors group">
        <svg class="w-4 h-4 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
        Back
      </a>
      
      <div class="flex flex-col items-center text-center mb-5">
        <a href="/" class="flex items-center gap-2 font-bold text-[14px] text-black mb-4 hover:opacity-80 transition">
          <div class="w-6 h-6 bg-black rounded-md flex items-center justify-center text-white">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
          </div>
          InterviewIQ.AI
        </a>
        
        <h1 class="text-[22px] font-bold text-black tracking-tight mb-1">Reset Password</h1>
        <p class="text-[13px] text-gray-500">Enter your email and we'll send you a reset token.</p>
      </div>

      <div id="message-container" class="hidden mb-3 p-3 text-[13px] rounded-lg text-center border"></div>

      <form id="forgot-form" class="space-y-3">
        <div>
          <label class="block text-[11px] font-bold text-black mb-1 uppercase tracking-wider">Email</label>
          <input type="email" id="email" required class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-2.5 text-[14px] outline-none focus:border-[#22C55E] focus:ring-2 focus:ring-[#22C55E]/20 transition-all" placeholder="name@company.com">
        </div>

        <button type="submit" class="w-full bg-[#22C55E] hover:bg-[#1ea951] text-white rounded-[12px] h-[50px] font-bold text-[14px] transition-colors mt-4 flex items-center justify-center">
          Send Reset Token
        </button>
      </form>

      <div class="mt-4 text-center flex flex-col gap-2">
        <p class="text-[13px] text-gray-500">
          Have a reset token? 
          <a href="/reset-password.html" class="font-bold text-black hover:underline">Use it here</a>
        </p>
        <p class="text-[13px] text-gray-500">
          Remembered it? 
          <a href="/login.html" class="font-bold text-black hover:underline">Sign in</a>
        </p>
      </div>

    </div>
    <script type="module" src="/src/forgot-password.js"></script>
  </body>
</html>
