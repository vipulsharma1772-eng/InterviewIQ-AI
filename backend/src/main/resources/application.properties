spring.application.name=backend

# Database Configuration (H2 In-Memory Database used for out-of-the-box local running)
spring.datasource.url=jdbc:h2:mem:interviewiq;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# MySQL Configuration (Uncomment to use real MySQL server)
# spring.datasource.url=jdbc:mysql://localhost:3306/interviewiq?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
