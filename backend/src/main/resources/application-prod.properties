spring.application.name=backend

# Render PostgreSQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Configuration
jwt.secret=${JWT_SECRET:7d428bfb0e128cb59a39ec8675626a570c9eb03d8d64112e47e5ed7a834ebbb1}
jwt.expiration=86400000

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}

# Razorpay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_TzY0M2hZc1B6U2}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:SecretKeyPlaceholder123}

# CORS Configuration
cors.allowed-origins=${FRONTEND_URL}
